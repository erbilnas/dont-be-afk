name: DontBeAFK
options:
  bundleIdPrefix: com.dontbeafk
  deploymentTarget:
    macOS: "26.0"
  developmentLanguage: en
  xcodeVersion: "17.0"

targets:
  DontBeAFK:
    type: application
    platform: macOS
    sources:
      - path: DontBeAFK
        excludes:
          - "**/*.plist"
        includes:
          - "**/*.swift"
      # Must not use type: folder here — xcassets must be folder.assetcatalog so
      # Xcode compiles icons with actool (About / Launchpad); otherwise the
      # catalog is copied verbatim and the app has no embedded app icon.
      - path: DontBeAFK/Assets.xcassets
      - path: ../cli
        type: folder
        buildPhase: resources
    settings:
      PRODUCT_NAME: "Don't Be AFK"
      PRODUCT_BUNDLE_IDENTIFIER: com.dontbeafk.app
      INFOPLIST_FILE: DontBeAFK/Info.plist
      INFOPLIST_KEY_NSHumanReadableCopyright: ""
      SWIFT_VERSION: "5.0"
      MACOSX_DEPLOYMENT_TARGET: "26.0"
      GENERATE_INFOPLIST_FILE: false
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: DontBeAFK/DontBeAFK.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      ENABLE_PREVIEWS: true
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
    preBuildScripts:
      - name: Set Version from Git Tag
        script: |
          # Get the latest git tag (e.g., v1.2.3 or 1.2.3)
          GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          # Remove 'v' prefix if present
          VERSION="${GIT_TAG#v}"
          
          # Default version if no tag found
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          
          # Get commit count for build number
          COMMIT_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "1")
          
          # Update build settings
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "${TARGET_BUILD_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $COMMIT_COUNT" "${TARGET_BUILD_DIR}/${INFOPLIST_PATH}" 2>/dev/null || true
          
          echo "Version set to: $VERSION (Build $COMMIT_COUNT)"
        basedOnDependencyAnalysis: false
