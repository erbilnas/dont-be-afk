name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3). Defaults to package.json.'
        required: false
        type: string

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "Version: $VERSION (from tag)"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Version: $VERSION (manual input)"
          else
            VERSION=$(bash scripts/release/get-version.sh)
            echo "Version: $VERSION (from package.json)"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build macOS App
        working-directory: ./app
        run: |
          VERSION="${{ env.VERSION }}"
          BUILD_NUMBER=$(bash ../scripts/release/get-build-number.sh)
          xcodebuild -project DontBeAFK.xcodeproj \
                     -scheme DontBeAFK \
                     -configuration Release \
                     -derivedDataPath ./build \
                     clean build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     MARKETING_VERSION="${VERSION}" \
                     CURRENT_PROJECT_VERSION="${BUILD_NUMBER}"

      - name: Create Installer Package
        run: |
          # Create package structure
          mkdir -p pkg/resources pkg/scripts

          # Create postinstall script (app name has spaces and apostrophe)
          cat > pkg/scripts/postinstall << 'EOF'
          #!/bin/bash
          chmod -R 755 "/Applications/Don't Be AFK.app"
          chmod +x "/Applications/Don't Be AFK.app/Contents/MacOS/Don't Be AFK"
          xattr -d com.apple.quarantine "/Applications/Don't Be AFK.app" 2>/dev/null || true
          exit 0
          EOF
          chmod +x pkg/scripts/postinstall

          # Create distribution.xml
          cat > pkg/distribution.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
              <title>Don't Be AFK ${VERSION}</title>
              <organization>com.dontbeafk</organization>
              <domains enable_localSystem="true"/>
              <options customize="never" require-scripts="false" rootVolumeOnly="true"/>
              <pkg-ref id="com.dontbeafk.app"/>
              <choices-outline>
                  <line choice="default">
                      <line choice="com.dontbeafk.app"/>
                  </line>
              </choices-outline>
              <choice id="default"/>
              <choice id="com.dontbeafk.app" visible="false">
                  <pkg-ref id="com.dontbeafk.app"/>
              </choice>
              <pkg-ref id="com.dontbeafk.app" version="${VERSION}" onConclusion="none">DontBeAFK.pkg</pkg-ref>
          </installer-gui-script>
          EOF

          # Create component plist for pkgbuild (app name has spaces and apostrophe)
          cat > pkg/component.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <array>
            <dict>
              <key>BundleHasStrictIdentifier</key>
              <true/>
              <key>BundleIsRelocatable</key>
              <false/>
              <key>BundleIsVersionChecked</key>
              <true/>
              <key>BundleOverwriteAction</key>
              <string>upgrade</string>
              <key>RootRelativeBundlePath</key>
              <string>Don't Be AFK.app</string>
            </dict>
          </array>
          </plist>
          PLIST

          # Build component package
          pkgbuild --root "./app/build/Build/Products/Release" \
                   --component-plist pkg/component.plist \
                   --identifier "com.dontbeafk.app" \
                   --version "${VERSION}" \
                   --install-location "/Applications" \
                   --scripts pkg/scripts \
                   pkg/DontBeAFK.pkg

          # Build product archive
          productbuild --distribution pkg/distribution.xml \
                       --package-path pkg \
                       "DontBeAFK-Installer-${VERSION}.pkg"

      - name: Create DMG Disk Image
        run: |
          DMG_TEMP_DIR="dmg_temp"
          DMG_NAME="DontBeAFK-${VERSION}.dmg"

          rm -rf "$DMG_TEMP_DIR"
          mkdir -p "$DMG_TEMP_DIR"

          cp -R "./app/build/Build/Products/Release/Don't Be AFK.app" "$DMG_TEMP_DIR/"
          ln -s /Applications "$DMG_TEMP_DIR/Applications"

          hdiutil create -volname "Don't Be AFK" \
                         -srcfolder "$DMG_TEMP_DIR" \
                         -ov \
                         -format UDZO \
                         "$DMG_NAME"

          rm -rf "$DMG_TEMP_DIR"

          if [ -f "$DMG_NAME" ]; then
            echo "✅ DMG created: $DMG_NAME"
            echo "Size: $(du -h "$DMG_NAME" | cut -f1)"
          else
            echo "❌ Failed to create DMG"
            exit 1
          fi

      - name: Package Command Line Version (macOS)
        run: bash scripts/release/package-cli.sh "${VERSION}"

      - name: Check if release assets already uploaded
        id: check_release
        run: |
          git fetch --tags --force
          TAG="v${VERSION}"
          DMG_FILE="DontBeAFK-${VERSION}.dmg"
          INSTALLER_FILE="DontBeAFK-Installer-${VERSION}.pkg"
          CLI_FILE="dont-be-afk-cli-macos-${VERSION}.tar.gz"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "skip_upload=false" >> $GITHUB_OUTPUT
            echo "No release for ${TAG}, will create and upload assets..."
            exit 0
          fi

          ASSETS="$(gh release view "$TAG" --json assets -q '.assets[].name' 2>/dev/null || true)"
          HAS_DMG=false
          HAS_PKG=false
          HAS_CLI=false

          echo "$ASSETS" | grep -qx "$DMG_FILE" && HAS_DMG=true
          echo "$ASSETS" | grep -qx "$INSTALLER_FILE" && HAS_PKG=true
          echo "$ASSETS" | grep -qx "$CLI_FILE" && HAS_CLI=true

          if [ "$HAS_DMG" = "true" ] && [ "$HAS_PKG" = "true" ] && [ "$HAS_CLI" = "true" ]; then
            echo "skip_upload=true" >> $GITHUB_OUTPUT
            echo "Release ${TAG} already has all assets, skipping upload..."
          else
            echo "skip_upload=false" >> $GITHUB_OUTPUT
            echo "Release ${TAG} is missing assets (dmg=${HAS_DMG}, pkg=${HAS_PKG}, cli=${HAS_CLI}), will upload..."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release files exist
        if: steps.check_release.outputs.skip_upload == 'false'
        id: verify_files
        run: |
          echo "Checking for release files..."
          INSTALLER_FILE="DontBeAFK-Installer-${VERSION}.pkg"
          DMG_FILE="DontBeAFK-${VERSION}.dmg"
          CLI_FILE="release/dont-be-afk-cli-macos-${VERSION}.tar.gz"

          INSTALLER_EXISTS=false
          DMG_EXISTS=false
          CLI_EXISTS=false

          if [ -f "$INSTALLER_FILE" ]; then
            echo "✓ Found installer: $INSTALLER_FILE"
            INSTALLER_EXISTS=true
          else
            echo "⚠️ Warning: Installer file not found: $INSTALLER_FILE"
          fi

          if [ -f "$DMG_FILE" ]; then
            echo "✓ Found DMG: $DMG_FILE"
            DMG_EXISTS=true
          else
            echo "⚠️ Warning: DMG file not found: $DMG_FILE"
          fi

          if [ -f "$CLI_FILE" ]; then
            echo "✓ Found CLI package: $CLI_FILE"
            CLI_EXISTS=true
          else
            echo "⚠️ Warning: CLI file not found: $CLI_FILE"
          fi

          FILES_LIST=""
          if [ "$INSTALLER_EXISTS" = "true" ]; then
            FILES_LIST="${FILES_LIST}${INSTALLER_FILE}"$'\n'
          fi
          if [ "$DMG_EXISTS" = "true" ]; then
            FILES_LIST="${FILES_LIST}${DMG_FILE}"$'\n'
          fi
          if [ "$CLI_EXISTS" = "true" ]; then
            FILES_LIST="${FILES_LIST}${CLI_FILE}"$'\n'
          fi

          if [ -z "$FILES_LIST" ]; then
            echo "❌ No release files found! Aborting release creation."
            exit 1
          fi

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo -n "$FILES_LIST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check_release.outputs.skip_upload == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: ${{ steps.verify_files.outputs.files }}
          draft: false
          prerelease: false
          generate_release_notes: true
