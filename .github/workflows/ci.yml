name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint Scripts
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: brew install shellcheck

      - name: Lint bash scripts
        working-directory: ./cli
        run: |
          shellcheck bin/dont-be-afk || true
          shellcheck lib/*.sh || true
          shellcheck install.sh || true

  build-ui:
    name: Build macOS UI App
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build with xcodebuild
        working-directory: ./app
        run: |
          VERSION=$(bash ../scripts/release/get-version.sh)
          BUILD_NUMBER=$(bash ../scripts/release/get-build-number.sh)
          xcodebuild -project DontBeAFK.xcodeproj \
                     -scheme DontBeAFK \
                     -configuration Release \
                     -derivedDataPath ./build \
                     clean build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     MARKETING_VERSION="${VERSION}" \
                     CURRENT_PROJECT_VERSION="${BUILD_NUMBER}"
