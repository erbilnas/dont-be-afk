name: DontBeAFK
options:
  bundleIdPrefix: com.dontbeafk
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  xcodeVersion: "14.0"

targets:
  DontBeAFK:
    type: application
    platform: macOS
    sources:
      - path: DontBeAFK
        excludes:
          - "**/*.plist"
    resources:
      - DontBeAFK/Assets.xcassets
      - DontBeAFK/Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dontbeafk.app
      INFOPLIST_FILE: DontBeAFK/Info.plist
      INFOPLIST_KEY_NSHumanReadableCopyright: ""
      SWIFT_VERSION: "5.0"
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      GENERATE_INFOPLIST_FILE: false
      CODE_SIGN_STYLE: Automatic
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      ENABLE_PREVIEWS: true
